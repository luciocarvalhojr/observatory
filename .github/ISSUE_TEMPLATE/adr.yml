name: 📋 Architecture Decision Record
description: Propose or document an architectural decision
title: "[ADR] "
labels: ["adr", "architecture"]
body:
  - type: input
    id: title
    attributes:
      label: Decision title
      placeholder: e.g. Use Redis for session storage
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What is the problem or situation that requires a decision?
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: Decision
      description: What was decided?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other options were evaluated?

  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: What are the trade-offs?
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Proposed
        - Accepted
        - Deprecated
        - Superseded
    validations:
      required: true
