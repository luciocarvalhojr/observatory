# =============================================================================
# Observatory — Shared golangci-lint configuration
# Source of truth: github.com/luciocarvalhojr/observatory
#
# Usage in each service:
#   # .golangci.yml
#   version: "2"
#   extends: "https://raw.githubusercontent.com/luciocarvalhojr/observatory/main/configs/.golangci.yml"
# =============================================================================

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # --- Correctness ---
    - errcheck        # unchecked errors
    - gosimple        # simplification suggestions
    - govet           # suspicious constructs
    - ineffassign     # unused assignments
    - staticcheck     # static analysis
    - unused          # unused code

    # --- Style & Quality ---
    - gofmt           # formatting
    - goimports       # import ordering
    - misspell        # common typos
    - whitespace      # leading/trailing whitespace
    - godot           # comment punctuation
    - exhaustive      # exhaustive switch statements

    # --- Security (SAST) ---
    - gosec           # security issues (G101–G601)

    # --- Complexity ---
    - cyclop          # cyclomatic complexity
    - funlen          # function length
    - gocognit        # cognitive complexity

    # --- Bugs ---
    - bodyclose       # HTTP response body not closed
    - noctx           # HTTP requests without context
    - sqlcloserows    # sql.Rows not closed
    - exportloopref   # loop variable capture

    # --- Observability ---
    - wrapcheck       # errors should be wrapped

linters-settings:
  gosec:
    excludes:
      - G115  # integer overflow (too noisy for homelab context)

  cyclop:
    max-complexity: 15

  funlen:
    lines: 80
    statements: 50

  gocognit:
    min-complexity: 20

  godot:
    scope: declarations

  wrapcheck:
    ignorePackageGlobs:
      - "github.com/gin-gonic/gin"
      - "github.com/luciocarvalhojr/*"

issues:
  exclude-rules:
    # Test files are allowed to be more relaxed
    - path: "_test\\.go"
      linters:
        - funlen
        - gocognit
        - cyclop
        - wrapcheck

    # main.go wiring is always a bit longer
    - path: "cmd/.*\\.go"
      linters:
        - funlen

  max-issues-per-linter: 0
  max-same-issues: 0